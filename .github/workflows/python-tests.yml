name: Python Tests

# This workflow is currently "neutered" (manual trigger only).
# To enable automatic testing on every push or pull request, 
# uncomment the 'push' and 'pull_request' sections below.

on:
  workflow_dispatch: # Allows manual triggering from the GitHub Actions tab

#  push:
#    branches: [ "main", "master" ]
#  pull_request:
#    branches: [ "main", "master" ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.13"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest

    - name: Run Tests
      run: |
        python -m pytest
